<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>ArcGIS Maps SDK for JavaScript Tutorials: Display a map</title>
    <!-- ArcGIS theme CSS (required) -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.34/@arcgis/core/assets/esri/themes/light/main.css">
    <link rel="stylesheet" href="map.css">

    
  </head>

  <body>

      <header>
        <h1>Places of interest at Provence-Alpes-Côte d'Azur, France</h1>
          <form id="js-markers-filter-form">  
                      <label for="markers-filter">Select markers to display</label>
                      <select name="markers-filter" id="markers-filter-select">
                          <option value="all">All markers</option>
                          <option value="beach">Beaches</option>
                          <option value="fortress">Fortresses</option>
                          <option value="walking">Walking paths</option>
                          <option value="museum">Museums</option>
                          <option value="mountain-cave">Mountain caves</option>
                          <option value="panorama">Panoramas</option>
                          <option value="park">Park</option>
                          <option value="lake">Lake</option>
                          <option value="promenade">Promenade</option>
                      </select>
        </form>
        <p>Some markers are not visible with this level of zoom. You can zoom out in order to see them.</p>
      </header>
      <div id="viewDiv"></div>

      <script type="module" src="js/main.js"></script>
  </body>

</html>
